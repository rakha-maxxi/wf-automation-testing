appId: com.sindika.workfusion
---
# TC-TASK-03: Verify On Going Tab Task List
# Verify tasks are displayed in sections on the On Going tab

- launchApp:
    clearState: false

- tapOn: "My Task"
- tapOn: "On Going"
# Draft Task section
- assertVisible: "Draft Task (2)"
- assertVisible: "Compliance Check-Up"
- assertVisible: "Due today by 12:00 WIB"
- assertVisible: "Quarterly Compliance Review"
- assertVisible: "Due today by 20:00 WIB"
# Overdue section
- assertVisible: "Overdue Tasks (3)"
- assertVisible: "Audit Preparation"
- assertVisible: "Due 14 Nov 2025 by 09:00 WIB"
- assertVisible: "Internal Policy Update"
- assertVisible: "Risk Management Review"
# Need Approval section
- assertVisible: "Need Approval (3)"
- assertVisible: "Budget Review Meeting"
- assertVisible: "Due tomorrow by 20.00 WIB"
- assertVisible: "Client Feedback Session"
- assertVisible: "Project Milestone Submission"
# Pending Tasks section
- assertVisible: "Pending Tasks (4)"
- assertVisible: "Regulatory Assessment"
- assertVisible: "Due today by 18:00 WIB"
- assertVisible: "Data Protection Compliance Review"
- assertVisible: "Due in 7 days by 11:00 WIB"
