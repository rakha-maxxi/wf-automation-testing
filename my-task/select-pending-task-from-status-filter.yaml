appId: com.sindika.workfusion
---
# TC-TASK-11: Select Pending Task from Status Filter
# Verify filtering by Pending Task status

- launchApp:
    clearState: true

- tapOn: "My Task"
- tapOn: "On Going"
- tapOn:
    index: 0
    id: "Button"
- tapOn: "Pending Task"
- tapOn: "Apply"
- assertVisible: "Pending Task"