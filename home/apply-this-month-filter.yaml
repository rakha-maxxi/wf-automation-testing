appId: com.sindika.workfusion
---
# - runFlow: ../auth/worker-login-success.yaml

# TC-HOME-08: Apply This Month Filter
# Verify selecting This Month filter updates the overview display

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: Work Overview
    timeout: 10000

- tapOn: Filter

- assertVisible: Overview Filter
- tapOn:
    point: "50%,71%"
- tapOn: Apply Filter

- assertVisible: ".*Showing this month.*"
