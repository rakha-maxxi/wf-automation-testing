appId: com.sindika.workfusion
---
# - runFlow: ../auth/worker-login-success.yaml

# TC-HOME-07: Apply This Week Filter
# Verify selecting This Week filter updates the overview display

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: Work Overview
    timeout: 10000

- tapOn: Filter

- assertVisible: Overview Filter
- tapOn:
    point: "50%,60%"
- tapOn: Apply Filter

- assertVisible: ".*Showing this week.*"
