appId: com.sindika.workfusion
---
# TC-PROFILE-11: Back from Change Password Page
# Verify navigating back from change password page

- launchApp:
    clearState: false

- tapOn: |-
    Profile
    Tab 3 of 3

- tapOn: Change Password
- assertVisible: Change Password

- tapOn:
    id: "btn-back"

- assertVisible: Profile
- assertVisible: "Setting your profile details"
