appId: com.sindika.workfusion
---
# TC-PROFILE-10: Verify Change Password Page Form Fields
# Verify all form fields and elements on change password page

- launchApp:
    clearState: false

- tapOn: |-
    Profile
    Tab 3 of 3

- tapOn: Change Password

- assertVisible: Change Password
- assertVisible: "Your password is private."
- assertVisible: "Please ensure its safety and do not give it away."
- assertVisible: Current Password
- assertVisible: "Enter current password"
- assertVisible: New Password
- assertVisible: "Enter new password"
- assertVisible: "Re-enter New Password"
- assertVisible: "Re-enter new password"
- assertVisible: Save Changes
