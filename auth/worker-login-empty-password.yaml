appId: com.sindika.workfusion
---
# TC-AUTH-04: Worker Login - Empty Password
# Verify sign in button behavior when password field is empty

- launchApp:
    clearState: true

- tapOn:
    text: Cancel
    optional: true
- tapOn:
    text: Not now
    optional: true

- tapOn: Continue to Work Fusion

- tapOn:
    id: "username"
- inputText: r
- inputText: akha
- pressKey: Back

- tapOn:
    text: Sign in
    index: 1

# Should remain on login page, not navigate to dashboard
- assertVisible: Password
