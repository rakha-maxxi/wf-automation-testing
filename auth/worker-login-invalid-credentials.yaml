appId: com.sindika.workfusion
---
# TC-AUTH-05: Worker Login - Invalid Credentials
# Verify error feedback when login with wrong credentials

- launchApp:
    clearState: true

- tapOn:
    text: Cancel
    optional: true
- tapOn:
    text: Not now
    optional: true

- tapOn: Continue to Work Fusion

- tapOn:
    id: "username"
- inputText: invalid
- inputText: user
- pressKey: Back

- tapOn:
    id: "password"
- inputText: WrongPassword123!
- pressKey: Back

- tapOn:
    text: Sign in
    index: 1

# Should remain on login page or show error
- assertVisible: Username or email
