- launchApp:
    clearState: false

- assertVisible: "Hi, Nailus ☀️\nWelcome to Work Fusion!"

- tapOn: "Monitoring\nTab 3 of 4"

- assertVisible: "Monitoring\nPage showing employees' task assignments"

- tapOn: "Due Date"

- tapOn: "Custom Range"

- tapOn: "9, Tuesday, June 9, 2026"

- tapOn: "20, Saturday, June 20, 2026, Today"

- tapOn: "Save"

- tapOn: "Apply Filter"
